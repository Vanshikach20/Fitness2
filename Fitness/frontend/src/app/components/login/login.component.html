<div class="auth-container">
  <div class="container py-4">
    <div class="row justify-content-center">
      <div class="col-lg-5 col-md-7">

        <!-- Logo & Title -->
        <div class="text-center mb-4 animate-fadeInUp">
          <div class="auth-icon-wrap mb-3">
            <span class="material-icons">login</span>
          </div>
          <h2 class="auth-title">Welcome Back</h2>
          <p class="auth-subtitle">Sign in to your FitTrack account</p>
        </div>

        <!-- Alert -->
        <div *ngIf="alertMessage" class="alert alert-dismissible fade show animate-fadeInUp"
             [ngClass]="alertClass" role="alert">
          {{ alertMessage }}
          <button type="button" class="btn-close" (click)="alertMessage = null"></button>
        </div>

        <!-- Login Form -->
        <div class="auth-card animate-fadeInUp">
          <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

            <div class="form-group mb-4">
              <label class="form-label">
                <span class="material-icons me-1">email</span> Email
              </label>
              <input formControlName="email" type="email" class="form-control custom-input"
                     placeholder="your@email.com" autocomplete="email" />
              <div *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
                <div class="error-text" *ngIf="loginForm.get('email')?.hasError('required')">
                  Email is required.
                </div>
                <div class="error-text" *ngIf="loginForm.get('email')?.hasError('email')">
                  Please enter a valid email address.
                </div>
              </div>
            </div>

            <div class="form-group mb-4">
              <label class="form-label">
                <span class="material-icons me-1">lock</span> Password
              </label>
              <input formControlName="password" type="password" class="form-control custom-input"
                     placeholder="Enter your password" autocomplete="current-password" />
              <div *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
                <div class="error-text" *ngIf="loginForm.get('password')?.hasError('required')">
                  Password is required.
                </div>
                <div class="error-text" *ngIf="loginForm.get('password')?.hasError('minlength')">
                  Password must be at least 6 characters.
                </div>
              </div>
            </div>

            <button type="submit" class="btn btn-glow w-100 mb-3"
                    [disabled]="loginForm.invalid || isSubmitting">
              <span class="material-icons me-2">{{ isSubmitting ? 'hourglass_top' : 'login' }}</span>
              {{ isSubmitting ? 'Signing in...' : 'Sign In' }}
            </button>

            <p class="text-center auth-link-text">
              Don't have an account?
              <a routerLink="/register" class="auth-link">Create one</a>
            </p>
          </form>
        </div>

      </div>
    </div>
  </div>
</div>
