<nav class="navbar navbar-expand-lg fixed-top navbar-dark shadow-lg">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" routerLink="/">
      <svg class="brand-logo me-2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="40" height="40">
        <defs>
          <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00d4ff"/>
            <stop offset="100%" stop-color="#00ff88"/>
          </linearGradient>
        </defs>
        <circle cx="32" cy="32" r="30" fill="none" stroke="url(#logoGrad)" stroke-width="3"/>
        <rect x="12" y="26" width="8" height="12" rx="2" fill="url(#logoGrad)"/>
        <rect x="44" y="26" width="8" height="12" rx="2" fill="url(#logoGrad)"/>
        <rect x="20" y="29" width="24" height="6" rx="2" fill="url(#logoGrad)"/>
        <rect x="8" y="28" width="4" height="8" rx="1.5" fill="url(#logoGrad)"/>
        <rect x="52" y="28" width="4" height="8" rx="1.5" fill="url(#logoGrad)"/>
      </svg>
      <span class="brand-text">FitTrack</span>
    </a>
    <button class="navbar-toggler border-0" type="button" (click)="toggleMenu()">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" [class.show]="isMenuOpen">
      <ul class="navbar-nav ms-auto align-items-center">
        <li class="nav-item">
          <a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
            <span class="material-icons me-1">home</span> Home
          </a>
        </li>

        <!-- Authenticated Links -->
        <ng-container *ngIf="isLoggedIn">
          <li class="nav-item">
            <a class="nav-link" routerLink="/dashboard" routerLinkActive="active">
              <span class="material-icons me-1">dashboard</span> Dashboard
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/analytics" routerLinkActive="active">
              <span class="material-icons me-1">insights</span> Analytics
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link btn-add-activity ms-lg-3" routerLink="/add-activity" routerLinkActive="active">
              <span class="material-icons me-1">add_circle</span> Add Activity
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/diet-planner" routerLinkActive="active">
              <span class="material-icons me-1">restaurant_menu</span> Diet Plan
            </a>
          </li>

          <!-- Welcome & Logout -->
          <li class="nav-item ms-lg-3">
            <span class="nav-link welcome-text">
              <span class="material-icons me-1">waving_hand</span>Hi, {{ userName }}
            </span>
          </li>
          <li class="nav-item ms-lg-1">
            <button class="btn btn-logout" (click)="logout()" title="Logout">
              <span class="material-icons">logout</span>
            </button>
          </li>
        </ng-container>

        <!-- Guest Links -->
        <ng-container *ngIf="!isLoggedIn">
          <li class="nav-item ms-lg-3">
            <a class="nav-link btn-add-activity" routerLink="/login" routerLinkActive="active">
              <span class="material-icons me-1">login</span> Sign In
            </a>
          </li>
        </ng-container>

        <li class="nav-item ms-lg-2">
          <button class="btn theme-toggle-btn" (click)="toggleTheme()" 
                  [title]="themeService.isDark ? 'Switch to Light Mode' : 'Switch to Dark Mode'">
            <span class="material-icons theme-icon">
              {{ themeService.isDark ? 'light_mode' : 'dark_mode' }}
            </span>
          </button>
        </li>
      </ul>
    </div>
  </div>
</nav>
