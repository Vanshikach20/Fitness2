<style>@import"https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap";:root{--bg-primary:#0a0a1a;--bg-secondary:#1a1a2e;--bg-tertiary:#16213e;--bg-card:linear-gradient(135deg, #1a1a2e, #16213e);--bg-hero:linear-gradient(135deg, #0f0c29, #302b63, #24243e);--bg-navbar:linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);--bg-input:rgba(255, 255, 255, .05);--bg-input-focus:rgba(255, 255, 255, .08);--bg-hover:rgba(0, 212, 255, .05);--text-primary:#ffffff;--text-secondary:rgba(255, 255, 255, .8);--text-muted:rgba(255, 255, 255, .5);--text-faint:rgba(255, 255, 255, .3);--border-color:rgba(0, 212, 255, .1);--border-hover:rgba(0, 212, 255, .3);--border-input:rgba(0, 212, 255, .15);--accent:#00d4ff;--accent-secondary:#00ff88;--accent-gradient:linear-gradient(135deg, #00d4ff, #00ff88);--accent-purple:#a855f7;--table-header-bg:rgba(0, 212, 255, .1);--table-row-border:rgba(255, 255, 255, .05);--badge-bg:linear-gradient(135deg, rgba(0, 212, 255, .15), rgba(0, 255, 136, .1));--scrollbar-track:#0a0a1a;--scrollbar-thumb:linear-gradient(135deg, #00d4ff, #00ff88);--shadow:0 10px 30px rgba(0, 0, 0, .3);--shadow-accent:0 10px 30px rgba(0, 212, 255, .15);--nav-link-color:rgba(255, 255, 255, .85);--footer-bg:linear-gradient(135deg, #1a1a2e, #16213e)}*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}body{font-family:Inter,Arial,sans-serif;margin:0;padding:0;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;overflow-x:hidden;transition:background .4s ease,color .4s ease}</style><link rel="stylesheet" href="styles.css" media="print" onload="this.media='all'"><noscript><link rel="stylesheet" href="styles.css"></noscript></head>
